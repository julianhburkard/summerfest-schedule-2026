<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summerfest 2026 — Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d12;color:#f0f0f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,#0d0d20 0%,#1a0a2e 100%);padding:18px 28px 14px;border-bottom:3px solid #FFD700;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
header h1{font-size:1.9rem;font-weight:900;letter-spacing:3px;color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,.4)}
header p{color:#aaa;font-size:.85rem;margin-top:2px}

/* DAY TABS */
.day-tabs{display:flex;background:#111217;border-bottom:2px solid #222;overflow-x:auto;gap:0}
.day-tab{padding:11px 22px;cursor:pointer;color:#777;font-weight:700;font-size:.85rem;letter-spacing:.5px;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0}
.day-tab:hover{color:#FFD700;background:rgba(255,215,0,.06)}
.day-tab.active{color:#FFD700;border-bottom-color:#FFD700;background:rgba(255,215,0,.08)}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:10px 20px;background:#111217;border-bottom:1px solid #222}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#ccc;cursor:pointer;padding:3px 7px;border-radius:20px;transition:background .15s}
.legend-item:hover{background:rgba(255,255,255,.08)}
.legend-item.dimmed{opacity:.35}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* SCHEDULE WRAPPER */
.schedule-wrap{overflow-x:auto;padding:0}
.schedule-inner{display:flex;min-width:max-content}

/* TIME AXIS */
.time-axis{width:52px;flex-shrink:0;padding-top:56px;position:sticky;left:0;background:#0d0d12;z-index:20}
.time-label{height:var(--hour-h);display:flex;align-items:flex-start;padding-top:2px;padding-right:6px;justify-content:flex-end;color:#555;font-size:11px;font-weight:600;position:relative}
.time-label::after{content:'';position:absolute;right:0;top:0;width:6px;height:1px;background:#333}

/* STAGES */
.stages-grid{display:flex;gap:6px;padding:0 12px 24px}
.stage-col{width:160px;flex-shrink:0;position:relative}
.stage-header{height:56px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:10px;font-weight:800;color:#FFD700;background:#18181f;border:1px solid #2a2a35;border-radius:8px 8px 0 0;padding:4px 6px;line-height:1.3;letter-spacing:.3px;text-transform:uppercase;position:sticky;top:0;z-index:10}
.stage-body{position:relative;background:#13131a;border:1px solid #222;border-top:none;border-radius:0 0 8px 8px}
.hour-row{height:var(--hour-h);border-bottom:1px solid #1d1d28}
.hour-row:nth-child(even){background:#141420}

/* ARTIST BLOCKS */
.artist-block{position:absolute;left:4px;right:4px;border-radius:6px;padding:5px 7px;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;overflow:hidden;transition:filter .15s,transform .12s,z-index 0s;border:1px solid rgba(255,255,255,.12);box-shadow:0 2px 8px rgba(0,0,0,.4)}
.artist-block:hover{filter:brightness(1.25);transform:scale(1.03);z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.7)}
.artist-block.dimmed{opacity:.15;filter:grayscale(1)}
.ab-name{font-size:11px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:2px;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.ab-genre{font-size:9px;font-weight:600;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:.5px}
.ab-listeners{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px}
.ab-time{font-size:9px;color:rgba(255,255,255,.6);margin-top:1px}

/* TOOLTIP */
.tooltip{position:fixed;background:#1e1e2e;border:1px solid #333;border-radius:10px;padding:12px 16px;font-size:12px;pointer-events:none;z-index:999;display:none;max-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.tooltip strong{font-size:14px;display:block;margin-bottom:4px;color:#fff}
.tooltip .tt-genre{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.tooltip .tt-listeners{color:#aaa;font-size:11px}
.tooltip .tt-hint{color:#666;font-size:10px;margin-top:6px}

/* SCROLL HINT */
.scroll-hint{text-align:center;color:#444;font-size:11px;padding:6px 0;letter-spacing:.5px}
</style>
</head>

// ──────────────────────────────────────────────
// Helpers
// ──────────────────────────────────────────────
function parseTime(s) {
  const [h, m] = s.split(':').map(Number);
  return h + m / 60;
}

function fmtListeners(n) {
  if (!n) return null;
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M monthly listeners';
  if (n >= 1e3) return Math.round(n / 1e3) + 'K monthly listeners';
  return n + ' monthly listeners';
}

function fmtTime12(s) {
  let [h, m] = s.split(':').map(Number);
  if (h >= 24) h -= 24;
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function spotifyUrl(name) {
  return `https://open.spotify.com/search/${encodeURIComponent(name)}`;
}

function genreColor(g) {
  return (GENRES[g] || GENRES['Other']).color;
}

// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────
let activeDay = DAYS[0].id;
let activeGenres = new Set(Object.keys(GENRES));

// ──────────────────────────────────────────────
// Render functions
// ──────────────────────────────────────────────
function renderTabs() {
  const el = document.getElementById('dayTabs');
  el.innerHTML = DAYS.map(d => `
    <div class="day-tab${d.id===activeDay?' active':''}" data-id="${d.id}">${d.label}</div>
  `).join('');
  el.querySelectorAll('.day-tab').forEach(t =>
    t.addEventListener('click', () => { activeDay = t.dataset.id; renderAll(); })
  );
}

function renderLegend() {
  const el = document.getElementById('legend');
  // Only show genres present in current day
  const day = DAYS.find(d => d.id === activeDay);
  const used = new Set(day.artists.map(a => a.g));
  el.innerHTML = [...Object.keys(GENRES)]
    .filter(g => used.has(g))
    .map(g => `
      <div class="legend-item${activeGenres.has(g)?'':' dimmed'}" data-genre="${g}" title="Click to toggle">
        <div class="legend-dot" style="background:${GENRES[g].color}"></div>
        ${g}
      </div>
    `).join('');
  el.querySelectorAll('.legend-item').forEach(item => {
    item.addEventListener('click', () => {
      const g = item.dataset.genre;
      if (activeGenres.has(g)) activeGenres.delete(g);
      else activeGenres.add(g);
      renderAll();
    });
  });
}

function renderSchedule() {
  const day = DAYS.find(d => d.id === activeDay);
  const totalHours = END_H - START_H;
  const gridH = totalHours * HOUR_H;

  // Time axis
  const axis = document.getElementById('timeAxis');
  axis.innerHTML = Array.from({length: totalHours}, (_, i) => {
    const h = START_H + i;
    const label = h === 12 ? '12 PM' : h < 12 ? `${h} AM` : h === 24 ? '12 AM' : `${h > 12 ? h - 12 : h} ${h >= 12 && h < 24 ? 'PM' : 'AM'}`;
    return `<div class="time-label">${label}</div>`;
  }).join('');

  // Stages
  const grid = document.getElementById('stagesGrid');
  grid.innerHTML = '';

  STAGES.forEach((stageName, si) => {
    const artists = day.artists.filter(a => a.s === si);
    if (!artists.length && !day.artists.some(a => a.s === si)) return;

    const col = document.createElement('div');
    col.className = 'stage-col';

    const header = document.createElement('div');
    header.className = 'stage-header';
    header.textContent = stageName;
    col.appendChild(header);

    const body = document.createElement('div');
    body.className = 'stage-body';
    body.style.height = gridH + 'px';
    body.style.position = 'relative';

    // Hour grid lines
    for (let i = 0; i < totalHours; i++) {
      const row = document.createElement('div');
      row.className = 'hour-row';
      body.appendChild(row);
    }

    // Artist blocks
    artists.forEach(a => {
      const t0 = parseTime(a.t0);
      const t1 = parseTime(a.t1 === '24:00' ? '24:00' : a.t1);
      const dur = Math.max(t1, t0 + 0.5) - t0;
      const top = (t0 - START_H) * HOUR_H;
      const height = Math.max(dur * HOUR_H - 2, 28);
      const color = genreColor(a.g);
      const dimmed = !activeGenres.has(a.g);

      const block = document.createElement('a');
      block.className = 'artist-block' + (dimmed ? ' dimmed' : '');
      block.href = spotifyUrl(a.n);
      block.target = '_blank';
      block.rel = 'noopener noreferrer';
      block.style.cssText = `top:${top}px;height:${height}px;background:${color};`;

      const listeners = fmtListeners(a.l);
      block.innerHTML = `
        <span class="ab-name">${a.n}</span>
        <span class="ab-genre">${a.g}</span>
        ${listeners ? `<span class="ab-listeners">${listeners}</span>` : ''}
        <span class="ab-time">${fmtTime12(a.t0)}</span>
      `;

      // Tooltip
      block.addEventListener('mouseenter', (e) => showTooltip(e, a));
      block.addEventListener('mouseleave', hideTooltip);
      block.addEventListener('mousemove', moveTooltip);

      body.appendChild(block);
    });

    col.appendChild(body);
    grid.appendChild(col);
  });
}

function renderAll() {
  renderTabs();
  renderLegend();
  renderSchedule();
}

// ──────────────────────────────────────────────
// Tooltip
// ──────────────────────────────────────────────
const tt = document.getElementById('tooltip');

function showTooltip(e, a) {
  const listeners = fmtListeners(a.l);
  const color = genreColor(a.g);
  tt.innerHTML = `
    <strong>${a.n}</strong>
    <div class="tt-genre" style="color:${color}">${a.g}</div>
    ${listeners ? `<div class="tt-listeners">🎧 ${listeners}</div>` : ''}
    <div class="tt-listeners">⏰ ${fmtTime12(a.t0)} – ${fmtTime12(a.t1)}</div>
    <div class="tt-listeners">📍 ${STAGES[a.s]}</div>
    <div class="tt-hint">Click to open Spotify ↗</div>
  `;
  tt.style.display = 'block';
  moveTooltip(e);
}

function hideTooltip() { tt.style.display = 'none'; }

function moveTooltip(e) {
  const W = window.innerWidth, H = window.innerHeight;
  const tw = tt.offsetWidth, th = tt.offsetHeight;
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + tw > W - 10) x = e.clientX - tw - 10;
  if (y + th > H - 10) y = e.clientY - th - 10;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

// ──────────────────────────────────────────────
// Boot
// ──────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
